name: E2E Tests

on:
  workflow_call:
    inputs:
      php-version:
        description: "Versione PHP"
        required: false
        default: "8.3"
        type: string
      node-version:
        description: "Versione di Node.js"
        required: false
        default: "22"
        type: string
      test-path:
        description: "Path o gruppo dei test E2E (es. tests/Browser o --group=browser)"
        required: false
        default: "tests/Browser"
        type: string
    secrets:
      GH_TOKEN:
        required: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: E2E Browser Tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: tests
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_ROOT_PASSWORD: ""
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: xdebug
          tools: composer
          extensions: json, dom, curl, libxml, mbstring
          ini-values: memory_limit=512M, max_execution_time=180, display_errors=On

      - name: Configure Composer Authentication
        run: composer config --global --auth github-oauth.github.com ${{ secrets.GH_TOKEN }}

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Environment configuration
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: Build Assets
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        run: |
          npx playwright install chromium
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Run E2E Tests
        run: php artisan test ${{ inputs.test-path }}
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tests
          DB_USERNAME: root
          DB_PASSWORD:

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: |
            storage/logs/*
            tests/Browser/screenshots/*
          retention-days: 7
          if-no-files-found: warn
