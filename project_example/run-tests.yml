name: Run Laravel Tests

on:
  pull_request:
    branches-ignore: ["main", "dev"]
    paths:
      - "**/*.php"
      - ".github/workflows/run-tests.yml"
      - "phpunit.xml.dist"
      - "composer.json"
      - "composer.lock"

jobs:
  call-workflow:
    uses: ITinternalDiMartino/ci-workflows/.github/workflows/laravel-projects-run-tests.yml@main
    with:
      php-versions: '["8.3"]'
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
